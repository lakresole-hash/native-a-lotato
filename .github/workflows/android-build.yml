name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # permet de lancer le build manuellement depuis l'onglet "Actions"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer le JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Rendre gradlew exécutable
        run: chmod +x ./gradlew

      # --- Build DEBUG (ne nécessite aucune clé de signature) ---
      - name: Build APK debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Publier l'APK debug comme artefact
        uses: actions/upload-artifact@v4
        with:
          name: aigle-lotto-debug
          path: app/build/outputs/apk/debug/*.apk

      # --- Build RELEASE signé (optionnel, voir la section "Signature" du README) ---
      # Décommentez ce bloc une fois les secrets configurés dans
      # Settings > Secrets and variables > Actions du dépôt GitHub :
      #   KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
      #
      # - name: Décoder le keystore
      #   run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore
      #
      # - name: Build APK release signé
      #   env:
      #     KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      #     KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      #     KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      #   run: ./gradlew assembleRelease --stacktrace
